<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card fade-up">
        <h2 id="pageTitle">Forgot Password</h2>
        <p class="auth-subtitle" id="pageSubtitle">Enter your email to receive a reset link</p>

        <!-- Request Reset Form -->
        <form id="forgotForm">
          <div class="mb-4">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" name="email" required placeholder="you@email.com">
          </div>
          <button type="submit" class="btn btn-primary-custom w-100" id="forgotBtn">Send Reset Link</button>
        </form>

        <!-- Reset Password Form (shown when token in URL) -->
        <form id="resetForm" style="display:none;">
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" name="password" required minlength="6">
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" name="confirmPassword" required>
          </div>
          <button type="submit" class="btn btn-primary-custom w-100" id="resetBtn">Reset Password</button>
        </form>

        <div class="auth-divider"><a href="login.html">Back to Login</a></div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    document.addEventListener('DOMContentLoaded', () => {
      if (token) {
        document.getElementById('pageTitle').textContent = 'Reset Password';
        document.getElementById('pageSubtitle').textContent = 'Enter your new password';
        document.getElementById('forgotForm').style.display = 'none';
        document.getElementById('resetForm').style.display = 'block';
      }

      document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = e.target.email.value;
        const btn = document.getElementById('forgotBtn');
        btn.disabled = true;
        try {
          const res = await API.forgotPassword(email);
          showToast(res.message, 'success');
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = e.target.password.value;
        const confirm = e.target.confirmPassword.value;
        if (password !== confirm) {
          showToast('Passwords do not match', 'error');
          return;
        }
        const btn = document.getElementById('resetBtn');
        btn.disabled = true;
        try {
          const res = await API.resetPassword(token, password);
          API.setAuth(res.data.token, { token: res.data.token });
          showToast('Password reset successful!', 'success');
          setTimeout(() => window.location.href = 'login.html', 1000);
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
