<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your Glow & Grace Salon account to book appointments and manage your beauty journey.">
  <title>Register | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card fade-up">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join the Glow & Grace family</p>
        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" required placeholder="Your full name">
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" name="email" required placeholder="you@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" name="phone" required placeholder="+1 (555) 000-0000">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required minlength="6" placeholder="Min. 6 characters">
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="confirmPassword" required placeholder="Confirm password">
          </div>
          <button type="submit" class="btn btn-primary-custom w-100" id="registerBtn">Create Account</button>
        </form>
        <div class="auth-divider">Already have an account? <a href="login.html">Sign In</a></div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!validateForm(e.target)) return;

        const formData = Object.fromEntries(new FormData(e.target));
        if (formData.password !== formData.confirmPassword) {
          showToast('Passwords do not match', 'error');
          return;
        }

        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
          const { confirmPassword, ...data } = formData;
          const res = await API.register(data);
          API.setAuth(res.data.token, res.data);
          showToast('Registration successful!', 'success');
          setTimeout(() => window.location.href = 'user/dashboard.html', 500);
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      });
    });
  </script>
</body>
</html>
