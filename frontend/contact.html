<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Glow & Grace Salon - visit us, call, or send a message. Find our location, hours, and contact details.">
  <title>Contact Us | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="page-header">
    <div class="container">
      <h1>Contact Us</h1>
      <ul class="breadcrumb-custom">
        <li><a href="index.html">Home</a></li>
        <li>/ Contact</li>
      </ul>
    </div>
  </section>

  <section class="section-padding">
    <div class="container">
      <div class="row g-5">
        <!-- Contact Info -->
        <div class="col-lg-4 fade-up">
          <div class="contact-info-card">
            <h3 class="mb-4">Get In Touch</h3>
            <div class="contact-info-item">
              <i class="bi bi-geo-alt-fill"></i>
              <div>
                <h6>Address</h6>
                <p id="contact-address" class="text-muted mb-0">123 Beauty Boulevard, Suite 100, New York, NY 10001</p>
              </div>
            </div>
            <div class="contact-info-item">
              <i class="bi bi-telephone-fill"></i>
              <div>
                <h6>Phone</h6>
                <p id="contact-phone" class="text-muted mb-0">+1 (555) 123-4567</p>
              </div>
            </div>
            <div class="contact-info-item">
              <i class="bi bi-envelope-fill"></i>
              <div>
                <h6>Email</h6>
                <p id="contact-email" class="text-muted mb-0">hello@glowgrace.com</p>
              </div>
            </div>
            <div class="contact-info-item">
              <i class="bi bi-clock-fill"></i>
              <div>
                <h6>Business Hours</h6>
                <p id="contact-hours" class="text-muted mb-0">
                  Mon-Fri: 9AM - 8PM<br>
                  Sat: 9AM - 6PM<br>
                  Sun: 10AM - 5PM
                </p>
              </div>
            </div>
            <div class="social-links mt-4" id="contact-social"></div>
          </div>
        </div>

        <!-- Contact Form -->
        <div class="col-lg-8 fade-up">
          <form class="contact-form" id="contactForm">
            <h3 class="mb-4">Send Us a Message</h3>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name *</label>
                <input type="text" class="form-control" name="name" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" name="email" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" name="phone">
              </div>
              <div class="col-md-6">
                <label class="form-label">Subject *</label>
                <input type="text" class="form-control" name="subject" required>
              </div>
              <div class="col-12">
                <label class="form-label">Message *</label>
                <textarea class="form-control" name="message" rows="5" required></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary-custom" id="contactSubmit">
                  <i class="bi bi-send"></i> Send Message
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Map -->
      <div class="map-container mt-5 fade-up">
        <iframe id="contact-map" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3022.9663095343008!2d-74.00425878459418!3d40.74076684379132!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c259a9b30eac9f%3A0x25905d500610b7e!2sEmpire%20State%20Building!5e0!3m2!1sen!2sus!4v1635959481600!5m2!1sen!2sus" allowfullscreen loading="lazy"></iframe>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const content = await API.getContent('contact');
        if (content.data.contact) {
          const c = content.data.contact;
          document.getElementById('contact-address').textContent = c.address;
          document.getElementById('contact-phone').textContent = c.phone;
          document.getElementById('contact-email').textContent = c.email;
          if (c.hours) {
            document.getElementById('contact-hours').innerHTML =
              `${c.hours.weekdays}<br>${c.hours.saturday}<br>${c.hours.sunday}`;
          }
          if (c.mapEmbed) document.getElementById('contact-map').src = c.mapEmbed;
          if (c.social) {
            document.getElementById('contact-social').innerHTML = `
              <a href="${c.social.facebook}" target="_blank"><i class="bi bi-facebook"></i></a>
              <a href="${c.social.instagram}" target="_blank"><i class="bi bi-instagram"></i></a>
              <a href="${c.social.twitter}" target="_blank"><i class="bi bi-twitter-x"></i></a>
              <a href="${c.social.pinterest}" target="_blank"><i class="bi bi-pinterest"></i></a>
            `;
          }
        }
      } catch (e) { /* use defaults */ }

      document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!validateForm(e.target)) return;

        const btn = document.getElementById('contactSubmit');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sending...';

        const formData = Object.fromEntries(new FormData(e.target));
        try {
          const res = await API.submitContact(formData);
          showToast(res.message, 'success');
          e.target.reset();
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-send"></i> Send Message';
        }
      });
    });
  </script>
</body>
</html>
