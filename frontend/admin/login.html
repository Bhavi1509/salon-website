<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
</head>
<body>
  <section class="auth-section">
    <div class="container">
      <div class="auth-card fade-up">
        <div class="text-center mb-3">
          <i class="bi bi-shield-lock fs-1 text-primary"></i>
        </div>
        <h2>Admin Login</h2>
        <p class="auth-subtitle">Glow & Grace Salon Management</p>
        <form id="adminLoginForm">
          <div class="mb-3">
            <label class="form-label">Admin Email</label>
            <input type="email" class="form-control" name="email" required placeholder="admin@glowgrace.com">
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary-custom w-100" id="adminLoginBtn">Sign In</button>
        </form>
        <div class="auth-divider"><a href="../login.html">User Login</a> · <a href="../index.html">Back to Website</a></div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Theme.init();
      if (API.isLoggedIn() && API.isAdmin()) {
        window.location.href = 'dashboard.html';
      }

      document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('adminLoginBtn');
        btn.disabled = true;
        try {
          const data = Object.fromEntries(new FormData(e.target));
          const res = await API.adminLogin(data);
          API.setAuth(res.data.token, res.data);
          showToast('Admin login successful!', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 500);
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
