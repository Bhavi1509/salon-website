<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Admin | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="../css/dashboard.css" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar" id="sidebar-container"></aside>
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div class="d-flex align-items-center gap-3">
          <button class="sidebar-toggle" id="sidebar-toggle"><i class="bi bi-list"></i></button>
          <h1>Gallery Management</h1>
        </div>
        <button class="btn btn-primary-custom btn-sm" onclick="openUploadModal()">
          <i class="bi bi-upload"></i> Upload Image
        </button>
      </header>

      <div class="dashboard-content">
        <div class="gallery-grid" id="admin-gallery"></div>
      </div>
    </main>
  </div>

  <!-- Upload Modal -->
  <div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Upload Gallery Image</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="uploadForm">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Title *</label>
              <input type="text" class="form-control" id="img-title" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Image URL *</label>
              <input type="url" class="form-control" id="img-url" required placeholder="https://images.unsplash.com/...">
            </div>
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select class="form-select" id="img-category">
                <option value="hair">Hair</option>
                <option value="makeup">Makeup</option>
                <option value="bridal">Bridal</option>
                <option value="nails">Nails</option>
                <option value="spa">Spa</option>
                <option value="salon">Salon</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="img-desc" rows="2"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-custom" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary-custom">Upload</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/admin-dashboard.js"></script>
  <script>
    let uploadModal;

    async function loadGallery() {
      const container = document.getElementById('admin-gallery');
      try {
        const res = await API.getAllGalleryAdmin();
        container.innerHTML = res.data.map(g => `
          <div class="gallery-item" style="position:relative;">
            <img src="${g.imageUrl}" alt="${g.title}">
            <div class="gallery-overlay" style="opacity:1;">
              <div>
                <h5>${g.title}</h5>
                <span class="badge bg-primary">${g.category}</span>
                <button class="btn-action btn-delete mt-2" onclick="deleteImage('${g._id}')">Delete</button>
              </div>
            </div>
          </div>
        `).join('') || '<p class="text-muted">No images yet.</p>';
      } catch (e) {
        container.innerHTML = `<p class="text-danger">${e.message}</p>`;
      }
    }

    function openUploadModal() { uploadModal.show(); }

    async function deleteImage(id) {
      if (!confirm('Delete this image?')) return;
      try {
        await API.deleteGalleryImage(id);
        showToast('Image deleted', 'success');
        loadGallery();
      } catch (e) { showToast(e.message, 'error'); }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAdminAuth()) return;
      Theme.init();
      renderAdminSidebar('Gallery');
      initSidebarToggle();
      uploadModal = new bootstrap.Modal(document.getElementById('uploadModal'));
      loadGallery();

      document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          await API.request('/gallery', {
            method: 'POST',
            body: JSON.stringify({
              title: document.getElementById('img-title').value,
              imageUrl: document.getElementById('img-url').value,
              category: document.getElementById('img-category').value,
              description: document.getElementById('img-desc').value,
            }),
          });
          showToast('Image uploaded', 'success');
          uploadModal.hide();
          e.target.reset();
          loadGallery();
        } catch (err) { showToast(err.message, 'error'); }
      });
    });
  </script>
</body>
</html>
