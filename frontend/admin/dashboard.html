<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="../css/dashboard.css" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar" id="sidebar-container"></aside>
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div class="d-flex align-items-center gap-3">
          <button class="sidebar-toggle" id="sidebar-toggle"><i class="bi bi-list"></i></button>
          <h1>Admin Dashboard</h1>
        </div>
        <button class="btn theme-toggle" onclick="Theme.toggle()"><i class="bi bi-moon-fill"></i></button>
      </header>

      <div class="dashboard-content">
        <div class="row g-4 mb-4">
          <div class="col-md-6 col-lg-3">
            <div class="stat-card">
              <div class="stat-icon users"><i class="bi bi-people"></i></div>
              <h3 id="stat-users">0</h3>
              <p>Total Users</p>
            </div>
          </div>
          <div class="col-md-6 col-lg-3">
            <div class="stat-card">
              <div class="stat-icon appointments"><i class="bi bi-calendar-check"></i></div>
              <h3 id="stat-appointments">0</h3>
              <p>Total Appointments</p>
            </div>
          </div>
          <div class="col-md-6 col-lg-3">
            <div class="stat-card">
              <div class="stat-icon today"><i class="bi bi-clock"></i></div>
              <h3 id="stat-today">0</h3>
              <p>Today's Appointments</p>
            </div>
          </div>
          <div class="col-md-6 col-lg-3">
            <div class="stat-card">
              <div class="stat-icon revenue"><i class="bi bi-currency-dollar"></i></div>
              <h3 id="stat-revenue">$0</h3>
              <p>Revenue Overview</p>
            </div>
          </div>
        </div>

        <div class="dash-card">
          <div class="dash-card-header">
            <h3><i class="bi bi-activity"></i> Recent Activity</h3>
            <a href="appointments.html" class="btn btn-outline-custom btn-sm">View All</a>
          </div>
          <div class="dash-card-body" id="recent-activity">
            <div class="text-center py-4"><div class="spinner-custom mx-auto"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/admin-dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAdminAuth()) return;
      Theme.init();
      renderAdminSidebar('Dashboard');
      initSidebarToggle();
      loadDashboardStats();
    });
  </script>
</body>
</html>
