<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse our stunning salon gallery featuring hair styling, makeup, bridal looks, nail art, and spa treatments.">
  <title>Gallery | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="page-header">
    <div class="container">
      <h1>Gallery</h1>
      <ul class="breadcrumb-custom">
        <li><a href="index.html">Home</a></li>
        <li>/ Gallery</li>
      </ul>
    </div>
  </section>

  <section class="section-padding">
    <div class="container">
      <div class="gallery-filters fade-up">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="hair">Hair</button>
        <button class="filter-btn" data-category="makeup">Makeup</button>
        <button class="filter-btn" data-category="bridal">Bridal</button>
        <button class="filter-btn" data-category="nails">Nails</button>
        <button class="filter-btn" data-category="spa">Spa</button>
        <button class="filter-btn" data-category="salon">Salon</button>
      </div>
      <div class="gallery-grid fade-up" id="gallery-container">
        <div class="text-center py-5 w-100">
          <div class="spinner-custom mx-auto"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Lightbox Modal -->
  <div class="modal fade" id="galleryModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="galleryModalTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center p-0">
          <img id="galleryModalImg" src="" alt="" class="w-100">
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    let galleryModal;

    async function loadGallery(category = 'all') {
      const container = document.getElementById('gallery-container');
      try {
        const cat = category === 'all' ? '' : category;
        const res = await API.getGallery(cat);
        if (!res.data.length) {
          container.innerHTML = '<p class="text-center text-muted w-100">No images found.</p>';
          return;
        }
        container.innerHTML = res.data.map(g => `
          <div class="gallery-item" onclick="openLightbox('${g.imageUrl}', '${g.title}')">
            <img src="${g.imageUrl}" alt="${g.title}" loading="lazy">
            <div class="gallery-overlay"><h5>${g.title}</h5></div>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = '<p class="text-center text-muted w-100">Unable to load gallery. Start the backend server.</p>';
      }
    }

    function openLightbox(src, title) {
      document.getElementById('galleryModalImg').src = src;
      document.getElementById('galleryModalTitle').textContent = title;
      galleryModal.show();
    }

    document.addEventListener('DOMContentLoaded', () => {
      galleryModal = new bootstrap.Modal(document.getElementById('galleryModal'));
      loadGallery();

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadGallery(btn.dataset.category);
        });
      });
    });
  </script>
</body>
</html>
