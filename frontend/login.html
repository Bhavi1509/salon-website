<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Glow & Grace Salon account to manage appointments and profile.">
  <title>Login | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card fade-up">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Sign in to your account</p>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" name="email" required placeholder="you@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required placeholder="Enter password">
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember">
              <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a href="forgot-password.html" class="small">Forgot Password?</a>
          </div>
          <button type="submit" class="btn btn-primary-custom w-100" id="loginBtn">Sign In</button>
        </form>
        <div class="auth-divider">Don't have an account? <a href="register.html">Register</a></div>
        <div class="text-center mt-3">
          <a href="admin/login.html" class="small text-muted">Admin Login</a>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (API.isLoggedIn()) {
        window.location.href = API.isAdmin() ? 'admin/dashboard.html' : 'user/dashboard.html';
        return;
      }

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!validateForm(e.target)) return;

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
          const data = Object.fromEntries(new FormData(e.target));
          const res = await API.login(data);
          API.setAuth(res.data.token, res.data);
          showToast('Login successful!', 'success');
          setTimeout(() => window.location.href = 'user/dashboard.html', 500);
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });
    });
  </script>
</body>
</html>
