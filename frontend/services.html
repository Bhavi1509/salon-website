<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore our premium salon services - hair cuts, spa, coloring, facials, makeup, bridal, manicure, and pedicure at Glow & Grace Salon.">
  <title>Services | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="page-header">
    <div class="container">
      <h1>Our Services</h1>
      <ul class="breadcrumb-custom">
        <li><a href="index.html">Home</a></li>
        <li>/ Services</li>
      </ul>
    </div>
  </section>

  <section class="section-padding">
    <div class="container">
      <div class="gallery-filters fade-up" id="service-filters">
        <button class="filter-btn active" data-category="">All</button>
        <button class="filter-btn" data-category="hair">Hair</button>
        <button class="filter-btn" data-category="spa">Spa</button>
        <button class="filter-btn" data-category="skin">Skin</button>
        <button class="filter-btn" data-category="makeup">Makeup</button>
        <button class="filter-btn" data-category="bridal">Bridal</button>
        <button class="filter-btn" data-category="nails">Nails</button>
      </div>
      <div class="row g-4" id="services-container">
        <div class="col-12 text-center py-5">
          <div class="spinner-custom mx-auto"></div>
          <p class="mt-3 text-muted">Loading services...</p>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    let allServices = [];

    async function loadServices(category = '') {
      const container = document.getElementById('services-container');
      try {
        const params = category ? `category=${category}` : '';
        const res = await API.getServices(params);
        allServices = res.data;
        renderServices(allServices);
      } catch (e) {
        container.innerHTML = `<div class="col-12 text-center"><p class="text-muted">Unable to load services. Please ensure the backend server is running.</p></div>`;
      }
    }

    function renderServices(services) {
      const container = document.getElementById('services-container');
      if (!services.length) {
        container.innerHTML = '<div class="col-12 text-center"><p class="text-muted">No services found.</p></div>';
        return;
      }
      container.innerHTML = services.map(s => `
        <div class="col-md-6 col-lg-4 fade-up">
          <div class="service-card">
            <div class="service-card-img">
              <img src="${s.image}" alt="${s.name}" loading="lazy">
            </div>
            <div class="service-card-body">
              <h3>${s.name}</h3>
              <p class="text-muted">${s.description}</p>
              <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="service-price">${formatPrice(s.price)}</span>
                <span class="service-duration"><i class="bi bi-clock"></i> ${s.duration} min</span>
              </div>
              <a href="user/booking.html?service=${s._id}" class="btn btn-primary-custom w-100">Book Now</a>
            </div>
          </div>
        </div>
      `).join('');
      initScrollAnimations();
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadServices();

      document.getElementById('service-filters').addEventListener('click', (e) => {
        if (e.target.classList.contains('filter-btn')) {
          document.querySelectorAll('#service-filters .filter-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          loadServices(e.target.dataset.category);
        }
      });
    });
  </script>
</body>
</html>
