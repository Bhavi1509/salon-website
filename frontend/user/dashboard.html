<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Glow & Grace Salon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="../css/dashboard.css" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="dashboard-sidebar" id="sidebar-container"></aside>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div class="d-flex align-items-center gap-3">
          <button class="sidebar-toggle" id="sidebar-toggle"><i class="bi bi-list"></i></button>
          <h1>My Dashboard</h1>
        </div>
        <div class="d-flex align-items-center gap-3">
          <div class="notification-bell" onclick="document.getElementById('notif-dropdown').classList.toggle('show')">
            <i class="bi bi-bell fs-5"></i>
            <span class="notification-badge" id="notif-badge" style="display:none;">0</span>
            <div class="notification-dropdown" id="notif-dropdown"></div>
          </div>
          <button class="btn theme-toggle" onclick="Theme.toggle()"><i class="bi bi-moon-fill"></i></button>
          <span class="text-muted" id="user-greeting"></span>
        </div>
      </header>

      <div class="dashboard-content">
        <!-- Quick Stats -->
        <div class="row g-4 mb-4">
          <div class="col-md-4">
            <div class="stat-card">
              <div class="stat-icon appointments"><i class="bi bi-calendar-check"></i></div>
              <h3 id="stat-total">0</h3>
              <p>Total Appointments</p>
            </div>
          </div>
          <div class="col-md-4">
            <div class="stat-card">
              <div class="stat-icon today"><i class="bi bi-clock"></i></div>
              <h3 id="stat-pending">0</h3>
              <p>Pending</p>
            </div>
          </div>
          <div class="col-md-4">
            <div class="stat-card">
              <div class="stat-icon revenue"><i class="bi bi-check-circle"></i></div>
              <h3 id="stat-completed">0</h3>
              <p>Completed</p>
            </div>
          </div>
        </div>

        <!-- Appointments Section -->
        <div class="dash-card mb-4" id="appointments">
          <div class="dash-card-header">
            <h3><i class="bi bi-calendar-check"></i> My Appointments</h3>
            <a href="booking.html" class="btn btn-primary-custom btn-sm">Book New</a>
          </div>
          <div class="dash-card-body">
            <div class="filter-bar">
              <input type="text" class="form-control" id="apt-search" placeholder="Search appointments...">
              <select class="form-select" id="apt-status-filter">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
                <option value="rejected">Rejected</option>
              </select>
              <button class="btn btn-outline-custom btn-sm" onclick="loadUserAppointments()">Filter</button>
            </div>
            <div id="appointments-list"></div>
          </div>
        </div>

        <!-- Profile Section -->
        <div class="dash-card mb-4" id="profile">
          <div class="dash-card-header"><h3><i class="bi bi-person"></i> Profile Management</h3></div>
          <div class="dash-card-body">
            <form id="profileForm" class="row g-3" style="max-width: 600px;">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="profile-name" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="profile-email" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" id="profile-phone" required>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary-custom">Update Profile</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Notifications Section -->
        <div class="dash-card" id="notifications">
          <div class="dash-card-header">
            <h3><i class="bi bi-bell"></i> Notifications</h3>
            <button class="btn btn-outline-custom btn-sm" onclick="API.markAllNotificationsRead().then(loadNotifications)">Mark All Read</button>
          </div>
          <div class="dash-card-body" id="notifications-list"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/user-dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireUserAuth()) return;
      Theme.init();
      renderUserSidebar('Dashboard');
      initSidebarToggle();

      const user = API.getUser();
      document.getElementById('user-greeting').textContent = `Hello, ${user.name}`;

      await loadUserAppointments();
      await loadNotifications();
      await loadProfile();

      // Update stats
      try {
        const res = await API.getMyAppointments();
        const apts = res.data;
        document.getElementById('stat-total').textContent = apts.length;
        document.getElementById('stat-pending').textContent = apts.filter(a => a.status === 'pending').length;
        document.getElementById('stat-completed').textContent = apts.filter(a => a.status === 'completed').length;
      } catch (e) { /* silent */ }

      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
          const res = await API.updateProfile({
            name: document.getElementById('profile-name').value,
            email: document.getElementById('profile-email').value,
            phone: document.getElementById('profile-phone').value,
          });
          API.setAuth(API.getToken(), res.data);
          showToast('Profile updated!', 'success');
        } catch (err) {
          showToast(err.message, 'error');
        }
      });

      // Hash navigation
      if (window.location.hash) {
        const el = document.querySelector(window.location.hash);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      }
    });
  </script>
</body>
</html>
