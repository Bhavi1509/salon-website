services:
  - type: web
    name: glow-grace-salon-backend
    env: node
    plan: starter
    region: oregon
    repo: <GIT_REPO_URL>
    branch: main
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    root: backend
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
